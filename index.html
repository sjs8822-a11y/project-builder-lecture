<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추천기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <button id="themeToggle" class="theme-toggle">🌙 다크 모드</button>
    
    <h1>🎱 로또 번호 추천기</h1>
    <p class="desc">
      버튼을 누르면 1~45 사이 숫자 중<br />
      중복 없는 로또 번호 6개를 5게임 추천합니다.
    </p>

    <button id="pickButton">5게임 추천 받기</button>

    <div class="result-list" id="resultList"></div>

    <div class="partnership-container">
      <h2 class="form-title">🤝 제휴 문의</h2>
      <p class="form-desc">궁금한 점이나 제휴 제안이 있으시면 아래 폼을 작성해 주세요.</p>
      <form action="https://formspree.io/f/mzdjzjar" method="POST" class="contact-form">
        <div class="form-group">
          <label for="name">성함</label>
          <input type="text" id="name" name="name" required placeholder="홍길동">
        </div>
        <div class="form-group">
          <label for="email">이메일</label>
          <input type="email" id="email" name="email" required placeholder="example@email.com">
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="4" required placeholder="제안하실 내용을 입력해 주세요."></textarea>
        </div>
        <button type="submit" class="submit-button">문의 보내기</button>
      </form>
    </div>

    <div id="disqus_container">
      <div id="disqus_thread"></div>
      <script>
          /**
          *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
          *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
          /*
          var disqus_config = function () {
          this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
          this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
          };
          */
          (function() { // DON'T EDIT BELOW THIS LINE
          var d = document, s = d.createElement('script');
          s.src = 'https://productbuild-9.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
          })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <p class="note">※ 재미용 추천입니다. 당첨을 보장하지 않습니다.</p>
  </div>

  <script src="main.js"></script>
</body>
</html>
