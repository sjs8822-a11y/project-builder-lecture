<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추천기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;a
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #dfe9f3);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #222;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 760px;
      background: #ffffff;
      border-radius: 24px;
      padding: 36px 28px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    .desc {
      margin: 0 0 28px;
      color: #555;
      line-height: 1.6;
    }

    button {
      border: none;
      background: #2563eb;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      padding: 14px 24px;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
      margin-bottom: 28px;
    }

    button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .result-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-align: left;
    }

    .result-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #f8fafc;
      border-radius: 16px;
      padding: 14px 16px;
      flex-wrap: wrap;
    }

    .label {
      min-width: 56px;
      font-size: 1rem;
      font-weight: bold;
      color: #1e3a8a;
    }

    .numbers {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .ball {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.05rem;
      font-weight: bold;
      color: #fff;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
    }

    .range-1-10 { background: #f59e0b; }
    .range-11-20 { background: #3b82f6; }
    .range-21-30 { background: #ef4444; }
    .range-31-40 { background: #6b7280; }
    .range-41-45 { background: #22c55e; }

    .note {
      margin-top: 24px;
      font-size: 0.95rem;
      color: #666;
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      .result-row {
        flex-direction: column;
        align-items: flex-start;
      }

      .label {
        min-width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎱 로또 번호 추천기</h1>
    <p class="desc">
      버튼을 누르면 1~45 사이 숫자 중<br />
      중복 없는 로또 번호 6개를 5게임 추천합니다.
    </p>

    <button id="pickButton">5게임 추천 받기</button>

    <div class="result-list" id="resultList"></div>

    <p class="note">※ 재미용 추천입니다. 당첨을 보장하지 않습니다.</p>
  </div>

  <script>
    const pickButton = document.getElementById('pickButton');
    const resultList = document.getElementById('resultList');

    function getBallClass(number) {
      if (number <= 10) return 'range-1-10';
      if (number <= 20) return 'range-11-20';
      if (number <= 30) return 'range-21-30';
      if (number <= 40) return 'range-31-40';
      return 'range-41-45';
    }

    function generateLottoNumbers() {
      const numbers = new Set();

      while (numbers.size < 6) {
        const randomNumber = Math.floor(Math.random() * 45) + 1;
        numbers.add(randomNumber);
      }

      return [...numbers].sort((a, b) => a - b);
    }

    function renderFiveGames() {
      resultList.innerHTML = '';

      for (let i = 1; i <= 5; i++) {
        const row = document.createElement('div');
        row.className = 'result-row';

        const label = document.createElement('div');
        label.className = 'label';
        label.textContent = `${i}게임`;

        const numbersWrap = document.createElement('div');
        numbersWrap.className = 'numbers';

        const numbers = generateLottoNumbers();

        numbers.forEach((number) => {
          const ball = document.createElement('div');
          ball.className = `ball ${getBallClass(number)}`;
          ball.textContent = number;
          numbersWrap.appendChild(ball);
        });

        row.appendChild(label);
        row.appendChild(numbersWrap);
        resultList.appendChild(row);
      }
    }

    pickButton.addEventListener('click', renderFiveGames);

    renderFiveGames();
  </script>
</body>
</html>
